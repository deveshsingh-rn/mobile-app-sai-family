plugins {
  id 'com.android.library'
  id 'org.jetbrains.kotlin.android'
}

group = 'com.saifamily.audiostream'
version = '1.0.0'

def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir.absolutePath, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
useCoreDependencies()

def getExtOrDefault = { name, fallback ->
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
}

android {
  namespace 'com.saifamily.audiostream'
  compileSdkVersion getExtOrDefault('compileSdkVersion', 36)

  defaultConfig {
    minSdkVersion getExtOrDefault('minSdkVersion', 24)
    targetSdkVersion getExtOrDefault('targetSdkVersion', 36)
  }
}
